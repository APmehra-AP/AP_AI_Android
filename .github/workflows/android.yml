name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            git zip unzip openjdk-17-jdk \
            autoconf automake libtool pkg-config \
            zlib1g-dev libncurses6 libtinfo6 \
            cmake libffi-dev libssl-dev

      - name: Install Buildozer
        run: |
          python -m pip install --upgrade pip
          pip install Cython==0.29.36
          pip install buildozer python-for-android

      - name: Add OpenRouter API Key
        run: |
          sed -i 's|OPENROUTER_API_KEY = ""|OPENROUTER_API_KEY = "${{ secrets.OPENROUTER_API_KEY }}"|' engine/config.py

      - name: Build APK
        run: |
          buildozer android debug --allow-root

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: AP_AI_Android_APK
          path: bin/*.apk
